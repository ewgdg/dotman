id = "nvim"
description = "Neovim configuration with a rendered target and an interactive reconcile step"

[vars.nvim]
leader = ","
colorscheme = "habamax"

[targets.init_lua]
source = "files/config/nvim/init.lua.tmpl"
path = "~/.config/nvim/init.lua"
render = "sh hooks/render.sh"
pull_view_repo = "render"
pull_view_live = "raw"
reconcile = "sh hooks/reconcile.sh"
reconcile_io = "tty"

[hooks]
guard_pull = '''
command -v nvim >/dev/null 2>&1
'''
