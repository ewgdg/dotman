id = "git"
description = "Base Git configuration"

[vars.git]
user_name = "Example User"
core_editor = "nvim"

[targets.gitconfig]
source = "files/gitconfig"
path = "~/.gitconfig"
chmod = "600"

[hooks]
guard_push = '''
command -v git >/dev/null 2>&1
'''
pre_push = [
  "{{ INSTALL }} git",
  '''
  sh "$DOTMAN_REPO_ROOT/scripts/log-package-event.sh" "install-packages" "$DOTMAN_PACKAGE_ID"
  ''',
]
post_push = "sh hooks/post-push.sh"
