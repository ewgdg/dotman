id = "sunshine"
description = "Fixture Sunshine package"

[targets.config]
source = "files/config/sunshine"
path = "~/.config/sunshine"
push_ignore = [
  "__pycache__/*",
  "tests/*",
  "sunshine-*.conf",
]
pull_ignore = [
  "__pycache__/*",
  "tests/*",
  "sunshine-*.conf",
  "sunshine.conf",
  "credentials/*",
  "sunshine.log",
  "*state.json",
]

[targets.selected_config]
source = "files/config/sunshine/sunshine-{{ desktop }}.conf"
path = "~/.config/sunshine/sunshine.conf"

[targets.service_override]
source = "files/config/systemd/user/sunshine.service.d"
path = "~/.config/systemd/user/sunshine.service.d"
